name: Weekly Tariff Updates

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even without changes'
        required: false
        default: 'false'

env:
  NODE_VERSION: '20'

jobs:
  check-and-update-tariffs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Run existing tests (baseline)
        run: npm test

      - name: Fetch official tariff data
        id: fetch
        run: |
          echo "Fetching official tariff data from Ministry of Transport..."
          
          # Note: The actual data.gov.il API integration would go here
          # For now, we'll validate the existing tariffs.json format
          # and check if it matches expected structure
          
          if [ -f "data/tariffs.json" ]; then
            echo "tariffs.json exists"
            # Validate JSON structure
            node -e "
              const data = require('./data/tariffs.json');
              if (!data.bus || !data.rail || !data.monthlyContracts) {
                console.error('Invalid tariffs.json structure');
                process.exit(1);
              }
              console.log('tariffs.json structure validated');
              console.log('Bus zones:', data.bus.zones.length);
              console.log('Rail zones:', data.rail.zones.length);
              console.log('Monthly contracts:', Object.keys(data.monthlyContracts).length);
            "
          else
            echo "tariffs.json not found"
            exit 1
          fi

      - name: Check for changes
        id: git-status
        run: |
          if [[ -n "$(git status --porcelain data/)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected in data/ directory"
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected in data/"
          fi

      - name: Configure git user
        if: steps.git-status.outputs.changes == 'true' || github.event.inputs.force_update == 'true'
        run: |
          git config --local user.email "imperial-bot@users.noreply.github.com"
          git config --local user.name "Imperial Bot"
          git config --local push.default simple

      - name: Run tests after any changes
        if: steps.git-status.outputs.changes == 'true' || github.event.inputs.force_update == 'true'
        run: npm test

      - name: Commit and push changes
        if: steps.git-status.outputs.changes == 'true' || github.event.inputs.force_update == 'true'
        run: |
          DATE=$(date -u +'%Y-%m-%d')
          git add data/tariffs.json
          git commit -m "chore: Auto-sync official tariffs ($(echo $DATE))"
          git push origin main
