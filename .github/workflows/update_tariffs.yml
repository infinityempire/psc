name: Weekly Tariff Updates

on:
  schedule:
    - cron: '0 0 * * 1'  # Run every Monday at 00:00 UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-tariffs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run tariff update script
        id: update
        run: python3 update_tariffs.py --fetch

      - name: Check for changes
        id: git-status
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No tariff changes detected"
          fi

      - name: Configure git user
        if: steps.git-status.outputs.changes == 'true'
        run: |
          git config --local user.email "imperial-bot@users.noreply.github.com"
          git config --local user.name "Imperial Bot"

      - name: Commit and push changes
        if: steps.git-status.outputs.changes == 'true'
        run: |
          git add data/tariffs.json
          git commit -m "chore: Auto-update tariffs via GitHub Actions ($(date -u +'%Y-%m-%d'))"
          git push
