name: Daily Fare Sync

on:
  schedule:
    - cron: '0 3 * * *'  # Run at 03:00 UTC daily
  workflow_dispatch:  # Allow manual trigger

jobs:
  sync-fares:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install puppeteer

      - name: Run fare sync script
        id: sync
        run: node sync-fares.js

      - name: Check for changes
        id: git-status
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No fare changes detected"
          fi

      - name: Commit and push changes
        if: steps.git-status.outputs.changes == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git commit -m "chore: Auto-sync fares from Ministry of Transport ($(date -u +'%Y-%m-%d'))"
          git push
