name: Ministry of Transport — tariff drift detector


on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:


permissions:
  contents: read
  issues: write


concurrency:
  group: ministry-tariff-drift
  cancel-in-progress: false


jobs:
  detect-drift:
    name: Compare data.gov.il feed vs local tariffs.json
    runs-on: ubuntu-latest
    timeout-minutes: 10


    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4


      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"


      - name: 🔍 Compare with data.gov.il GTFS feed
        id: compare
        run: python scripts/check_ministry_tariffs.py
        continue-on-error: true


      - name: 📦 Upload feed snapshot artifact
        if: always() && hashFiles('data/feed_snapshot.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: feed-snapshot
          path: data/feed_snapshot.json
          retention-days: 14


      - name: 🐛 Open drift issue (if new rates detected)
        if: hashFiles('data/feed_snapshot.json') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const snapshot = JSON.parse(fs.readFileSync('data/feed_snapshot.json', 'utf8'));
            const diffs = snapshot.diffs || {};
            const hasDrift =
              (diffs.inFeedNotInTariffs && diffs.inFeedNotInTariffs.length > 0) ||
              (diffs.inTariffsNotInFeed && diffs.inTariffsNotInFeed.length > 0);


            if (!hasDrift) {
              core.info('No drift — skipping issue creation.');
              return;
            }


            const { data: listed } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ministry-tariff-drift',
              per_page: 1,
            });


            if (listed.length > 0) {
              core.info(`Open issue #${listed[0].number} already exists — skipping duplicate.`);
              return;
            }


            const fmt = (arr) => (arr && arr.length ? arr.map(v => `• \`${v.toFixed(2)} ₪\``).join('\n') : '_(אין)_');
            const title = '🚨 זיהוי עדכון תעריפים — משרד התחבורה (data.gov.il)';
            const body = [
              '## זוהתה סטייה בין ה-GTFS הציבורי לבין `data/tariffs.json`',
              '',
              `- **תאריך בדיקה**: ${snapshot.fetchedAt}`,
              `- **מקור הנתונים**: ${snapshot.feedResourceUrl || '_n/a_'}`,
              '',
              '### 💰 מחירים חדשים ב-GTFS שלא קיימים במחשבון',
              fmt(diffs.inFeedNotInTariffs),
              '',
              '### 🏷️ מחירים במחשבון שלא נמצאו ב-GTFS העדכני',
              fmt(diffs.inTariffsNotInFeed),
              '',
              '---',
              '### 🛠️ צעדים לעדכון',
              '1. ודא/י את התעריפים החדשים בפרסומי משרד התחבורה ("דרך שווה").',
              '2. עדכן/י את `data/tariffs.json` ואת קבועי ברירת המחדל ב-`index.html`.',
              '3. הרץ/י לבדיקה מקומית: `node scripts/validate-tariffs.mjs`.',
              '4. סגור/י את ה-Issue לאחר מיזוג השינויים.',
              '',
              '<sub>נוצר אוטומטית על־ידי `.github/workflows/check-ministry-tariffs.yml`</sub>',
            ].join('\n');


            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ministry-tariff-drift', 'automated-check'],
            });
            core.info('Issue opened successfully.');
