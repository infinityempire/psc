<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון תעריפי תחבורה ציבורית</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#1a5276,#2874a6,#3498db);min-height:100vh;padding:30px 15px}
        .container{max-width:95%;margin:0 auto;background:#fff;border-radius:20px;padding:20px}
        .header{background:linear-gradient(#1e3a5f,#2c5282);color:#fff;padding:40px;text-align:center;border-radius:20px 20px 0 0}
        .header h1{font-size:1.8em;margin-bottom:10px}
        .form-section{padding:35px}
        .input-group{margin-bottom:20px}
        .input-group label{display:block;font-weight:600;color:#2c3e50;margin-bottom:8px}
        .input-group input{width:100%;padding:15px;border:2px solid #e0e0e0;border-radius:12px;font-size:1.1em}
        .ticket-type-section{background:#e8f5e9;border-radius:15px;padding:20px;margin-bottom:25px;border:2px solid #a5d6a7}
        .ticket-type-section h3{color:#2c3e50;margin-bottom:15px}
        .ticket-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
        .ticket-type-option{display:none}
        .ticket-type-option+label{display:block;padding:15px;background:#fff;border:2px solid #c8e6c9;border-radius:10px;text-align:center;cursor:pointer}
        .ticket-type-option:checked+label{background:#4caf50;color:#fff}
        .passenger-profiles{background:#f8f9fa;border-radius:15px;padding:20px;margin-bottom:25px}
        .passenger-profiles h3{color:#2c3e50;margin-bottom:15px}
        .profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
        .profile-option{display:none}
        .profile-option+label{display:block;padding:12px;background:#fff;border:2px solid #ddd;border-radius:10px;text-align:center;cursor:pointer}
        .profile-option:checked+label{background:#3498db;color:#fff}
        #calculate-btn{width:100%;padding:18px;background:linear-gradient(#27ae60,#2ecc71);color:#fff;border:none;border-radius:12px;font-size:1.3em;font-weight:bold;cursor:pointer}
        #calculate-btn:hover{transform:translateY(-2px)}
        #calculate-btn:disabled{background:#999;cursor:not-allowed}
        .results-section{padding:35px;display:none}
        .results-section.active{display:block}
        .result-card{background:#ffffff;color:#2c3e50;border-radius:20px;padding:25px;text-align:center;margin-bottom:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);border:2px solid #e0e0e0}
        .result-card .label{font-size:1.1em;margin-bottom:8px;color:#666}
        .result-card .ticket-type{font-size:1.2em;font-weight:bold;margin-bottom:5px;color:#2c3e50}
        .result-card .price{font-size:2.5em;font-weight:bold;color:#27ae60}
        .results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px}
        .fare-breakdown{background:#f8f9fa;border-radius:15px;padding:20px;margin-top:20px}
        .breakdown-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #e0e0e0}
        .breakdown-item:last-child{font-weight:bold;color:#27ae60}
        .fallback-notice{background:#fff3cd;border-radius:10px;padding:15px;margin-top:15px}
        .disclaimer{margin-top:20px;padding:15px;background:#f8f9fa;border-radius:8px;font-size:0.85em;color:#666}
        
        /* Mobile Responsive Styles */
        @media (max-width: 600px) {
            body {
                padding: 15px 10px;
            }
            .container {
                padding: 15px;
                max-width: 100%;
                border-radius: 15px;
            }
            .header {
                padding: 25px 15px;
                border-radius: 15px 15px 0 0;
            }
            .header h1 {
                font-size: 1.4em;
            }
            .form-section,
            .results-section {
                padding: 20px;
            }
            .input-group input {
                padding: 12px;
                font-size: 1em;
            }
            .ticket-type-grid,
            .profile-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 8px;
            }
            .ticket-type-option+label,
            .profile-option+label {
                padding: 10px 8px;
                font-size: 0.85em;
                word-wrap: break-word;
                overflow-wrap: break-word;
                hyphens: auto;
            }
            .results-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .result-card .price {
                font-size: 2em;
            }
            .breakdown-item {
                padding: 10px 0;
                font-size: 0.9em;
            }
        }
        
        @media (max-width: 400px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
            .ticket-type-grid {
                grid-template-columns: 1fr;
            }
            .ticket-type-option+label,
            .profile-option+label {
                padding: 12px 10px;
                font-size: 0.9em;
            }
        }
        
        /* Tablet styles */
        @media (min-width: 601px) and (max-width: 900px) {
            .profile-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .results-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚌 מחשבון תעריפי תחבורה</h1>
        </div>
        <div class="form-section">
            <div class="input-group">
                <label>📍 מוצא:</label>
                <input type="text" id="origin" placeholder="ירושלים">
            </div>
            <div class="input-group">
                <label>🎯 יעד:</label>
                <input type="text" id="dest" placeholder="תל אביב">
            </div>
            <div class="ticket-type-section">
                <h3>🎫 סוג כרטיס:</h3>
                <div class="ticket-type-grid">
                    <div><input type="radio" name="ticketType" id="t-single" value="single" class="ticket-type-option" checked><label for="t-single"> נסיעה בודדת</label></div>
                    <div><input type="radio" name="ticketType" id="t-daily" value="daily" class="ticket-type-option"><label for="t-daily"> חופשי יומי</label></div>
                    <div><input type="radio" name="ticketType" id="t-monthly" value="monthly" class="ticket-type-option"><label for="t-monthly"> חופשי חודשי</label></div>
                </div>
            </div>
            <div class="passenger-profiles">
                <h3>👤 פרופיל:</h3>
                <div class="profile-grid">
                    <div><input type="radio" name="passenger" id="p-adult" value="adult" class="profile-option" checked><label for="p-adult"> מבוגר</label></div>
                    <div><input type="radio" name="passenger" id="p-youth" value="youth" class="profile-option"><label for="p-youth"> נוער עד 18 (50%)</label></div>
                    <div><input type="radio" name="passenger" id="p-youth26" value="youth_18_26" class="profile-option"><label for="p-youth26"> צעיר 18-26 (33%)</label></div>
                    <div><input type="radio" name="passenger" id="p-senior" value="senior" class="profile-option"><label for="p-senior"> ותיק/ות (50%)</label></div>
                    <div><input type="radio" name="passenger" id="p-student" value="student" class="profile-option"><label for="p-student"> סטודנט (33%)</label></div>
                    <div><input type="radio" name="passenger" id="p-disabled" value="disabled" class="profile-option"><label for="p-disabled"> נכה (50%)</label></div>
                    <div><input type="radio" name="passenger" id="p-soldier" value="soldier" class="profile-option"><label for="p-soldier"> חייל (חינם)</label></div>
                </div>
            </div>
            <button id="calculate-btn">🔍 חשב תעריף</button>
        </div>
        <div class="results-section" id="results">
            <div class="results-grid" id="results-grid">
                <div class="result-card" id="result-single">
                    <div class="ticket-type">נסיעה בודדת</div>
                    <div class="label">מחיר:</div>
                    <div class="price"><span id="price-single">0.00</span> ₪</div>
                </div>
                <div class="result-card" id="result-daily">
                    <div class="ticket-type">חופשי יומי</div>
                    <div class="label">מחיר:</div>
                    <div class="price"><span id="price-daily">0.00</span> ₪</div>
                </div>
                <div class="result-card" id="result-monthly">
                    <div class="ticket-type">חופשי חודשי</div>
                    <div class="label">בינעירוני ארצי:</div>
                    <div class="price"><span id="price-monthly-national">0.00</span> ₪</div>
                    <div class="label" style="margin-top:8px;">משולב רכבת:</div>
                    <div class="price"><span id="price-monthly-train">0.00</span> ₪</div>
                    <div class="label" style="margin-top:8px;">פריפריה:</div>
                    <div class="price"><span id="price-monthly-periphery">-</span></div>
                    <div class="label" style="margin-top:8px;">אילת:</div>
                    <div class="price"><span id="price-monthly-eilat">-</span></div>
                </div>
            </div>
            <div class="fare-breakdown">
                <div class="breakdown-item"><span>מוצא:</span><span id="r-origin">-</span></div>
                <div class="breakdown-item"><span>יעד:</span><span id="r-dest">-</span></div>
                <div class="breakdown-item"><span>סוג נבחר:</span><span id="r-type">-</span></div>
                <div class="breakdown-item"><span>סופי:</span><span id="r-final">0.00 ₪</span></div>
            </div>
            <div class="fallback-notice" id="fallback" style="display:none;">
                <strong>⚠️ מנגנון מקומי פעיל - מחיר בסיס 8.00 ₪</strong>
            </div>
            <div class="disclaimer">⚠️ שימוש להמחשה בלבד</div>
        </div>
    </div>
    <script>
        // ============================================================
        // ISRAELI MINISTRY OF TRANSPORT FARE RULE ENGINE
        // Structured Client-Side Rule Engine based on official fare clusters
        // ============================================================

        // ============================================================
        // CITY DATABASE WITH COORDINATES
        // ============================================================
        var CITIES = {
            'תל אביב': [32.0853, 34.7818],
            'ירושלים': [31.7683, 35.2137],
            'חיפה': [32.794, 34.9896],
            'באר שבע': [31.253, 34.7915],
            'נתניה': [32.329, 34.856],
            'אשדוד': [31.804, 34.655],
            'רמת גן': [32.07, 34.824],
            'פתח תקווה': [32.084, 34.888],
            'ראשון לציון': [31.971, 34.789],
            'חולון': [32.016, 34.779],
            'נהריה': [32.9955, 35.0925],
            'ראש הנקרה': [33.0855, 35.1104],
            'עכו': [32.9277, 35.0822],
            'כרמיאל': [32.9176, 35.2969],
            'טבריה': [32.7940, 35.5314],
            'נצרת': [32.7021, 35.2978],
            'אילת': [29.5581, 34.9512],
            'אשקלון': [31.8040, 34.6550],
            'רחובות': [31.8928, 34.8113],
            'הרצליה': [32.1656, 34.8467],
            'הוד השרון': [32.1525, 34.8903],
            'רמלה': [31.9275, 34.8611],
            'לוד': [31.9497, 34.8958],
            'מודיעין': [31.8973, 35.0103],
            'בית שמש': [31.7466, 34.9881],
            'קרית שמונה': [33.2077, 35.5694],
            'צפת': [32.9658, 35.4983],
            'עפולה': [32.6080, 35.2896]
        };

        // Cities that invalidate Periphery pass
        var GUSH_DAN_CITIES = ['תל אביב', 'רמת גן'];

        // ============================================================
        // FARE RULES - Official Ministry of Transport fare zones
        // Source: bus.gov.il - Official fare table
        // ============================================================
        var FARE_RULES = {
            yellow: {       // 0-15 km
                maxDistance: 15,
                single: 8.00,
                daily: 17.50,
                label: 'צהוב (0-15 ק"מ)'
            },
            green: {        // 15-40 km
                maxDistance: 40,
                single: 14.50,
                daily: 29.00,
                label: 'ירוק (15-40 ק"מ)'
            },
            lightblue: {    // 40-75 km
                maxDistance: 75,
                single: 19.00,
                daily: 37.50,
                label: 'תכלת (40-75 ק"מ)'
            },
            blue: {         // 75-120 km
                maxDistance: 120,
                single: 19.00,
                daily: 37.50,
                label: 'כחול (75-120 ק"מ)'
            },
            purple: {       // 120-225 km
                maxDistance: 225,
                single: 30.50,
                daily: 60.50,
                label: 'סגול (120-225 ק"מ)'
            },
            gray: {         // 225+ km
                maxDistance: Infinity,
                single: 74.00,
                daily: 79.50,
                label: 'אפור (225+ ק"מ)'
            }
        };

        // ============================================================
        // MONTHLY CONTRACTS (Official Reform Passes)
        // ============================================================
        var MONTHLY_CONTRACTS = {
            national: {
                id: 'national',
                name: 'חופשי חודשי ארצי',
                base: 315.00,
                label: 'בינעירוני ארצי'
            },
            nationalTrain: {
                id: 'nationalTrain',
                name: 'חופשי ארצי משולב רכבת',
                base: 464.00, // Default, overridden by zone in evaluateMonthlyContract
                label: 'משולב רכבת',
                condition: 'intercity' // Only for distance > 40km
            },
            periphery: {
                id: 'periphery',
                name: 'חופשי חודשי פריפריה',
                base: 133.00,
                label: 'פריפריה',
                invalidCities: GUSH_DAN_CITIES.concat(['חיפה', 'ירושלים']),
                invalidMessage: 'לא תקף במסלול זה'
            },
            eilat: {
                id: 'eilat',
                name: 'חופשי חודשי אילת',
                base: 114.50,
                label: 'אילת',
                requiredCity: 'אילת'
            }
        };

        // ============================================================
        // PASSENGER PROFILES & DISCOUNT RULES
        // ============================================================
        var FREE_PROFILES = ['soldier', 'national_service', 'pre_military', 'blind', 'senior_75'];

        // Monthly pass discounts by profile
        var MONTHLY_DISCOUNTS = {
            adult: 0,
            youth: 0.50,        // Youth under 18 - 50% off
            youth_18_26: 0.33, // Young adults 18-26 - 33% off
            senior: 0.50,      // Senior - 50% off
            student: 0.33,     // Student - 33% off
            disabled: 0.50     // Disabled - 50% off
        };

        // ============================================================
        // UTILITY FUNCTIONS
        // ============================================================
        
        // Haversine distance calculation
        function calculateDistance(lat1, lon1, lat2, lon2) {
            var R = 6371; // Earth radius in km
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function getCoords(cityName) {
            cityName = cityName.trim().toLowerCase();
            for (var city in CITIES) {
                if (city.trim().toLowerCase() === cityName) return CITIES[city];
            }
            return null;
        }

        function isFreeProfile(profile) {
            return FREE_PROFILES.indexOf(profile) !== -1;
        }

        function getMonthlyDiscount(profile) {
            return MONTHLY_DISCOUNTS[profile] || 0;
        }

        // ============================================================
        // FARE RULE ENGINE
        // ============================================================
        
        function determineFareZone(distance) {
            if (distance <= FARE_RULES.yellow.maxDistance) {
                return { zone: 'yellow', data: FARE_RULES.yellow, distance: distance };
            } else if (distance <= FARE_RULES.green.maxDistance) {
                return { zone: 'green', data: FARE_RULES.green, distance: distance };
            } else if (distance <= FARE_RULES.lightblue.maxDistance) {
                return { zone: 'lightblue', data: FARE_RULES.lightblue, distance: distance };
            } else if (distance <= FARE_RULES.blue.maxDistance) {
                return { zone: 'blue', data: FARE_RULES.blue, distance: distance };
            } else if (distance <= FARE_RULES.purple.maxDistance) {
                return { zone: 'purple', data: FARE_RULES.purple, distance: distance };
            } else {
                return { zone: 'gray', data: FARE_RULES.gray, distance: distance };
            }
        }

        // Monthly train prices by zone (from bus.gov.il)
        var MONTHLY_TRAIN_PRICES = {
            yellow: 323,
            green: 323,
            lightblue: 464,
            blue: 684,
            purple: 684,
            gray: 684
        };

        function evaluateMonthlyContract(contract, fareZone, origin, dest, discount, isFree) {
            var result = { valid: true, price: null, message: '' };
            var originLower = origin.trim().toLowerCase();
            var destLower = dest.trim().toLowerCase();

            // FREE profiles always pay 0.00 for any ticket type
            if (isFree) {
                result.price = 0.00;
                return result;
            }

            // Check required city for Eilat pass
            if (contract.requiredCity) {
                var requiredCityLower = contract.requiredCity.trim().toLowerCase();
                if (originLower !== requiredCityLower && destLower !== requiredCityLower) {
                    result.valid = false;
                    result.message = 'לא רלוונטי';
                    return result;
                }
            }

            // Check invalid cities for Periphery pass
            if (contract.invalidCities) {
                for (var i = 0; i < contract.invalidCities.length; i++) {
                    var invalidCityLower = contract.invalidCities[i].trim().toLowerCase();
                    if (originLower === invalidCityLower || destLower === invalidCityLower) {
                        result.valid = false;
                        result.message = contract.invalidMessage;
                        return result;
                    }
                }
            }

            // Check intercity condition for National+Train
            // National+Train is only valid for intercity routes (>40km)
            if (contract.condition === 'intercity' && 
                (fareZone.zone === 'yellow' || fareZone.zone === 'green')) {
                result.valid = false;
                result.message = 'לא רלוונטי למסלול';
                return result;
            }

            // Determine base price - National+Train uses zone-based pricing
            var basePrice = contract.base;
            if (contract.id === 'nationalTrain') {
                basePrice = MONTHLY_TRAIN_PRICES[fareZone.zone] || contract.base;
            }

            // Calculate price with discount
            result.price = Math.round(basePrice * (1 - discount) * 100) / 100;
            return result;
        }

        function calculateFare(origin, dest, passengerType) {
            var oc = getCoords(origin);
            var dc = getCoords(dest);
            var isFallback = !oc || !dc;
            
            var distance, fareZone;
            
            if (oc && dc) {
                distance = calculateDistance(oc[0], oc[1], dc[0], dc[1]);
                fareZone = determineFareZone(distance);
            } else {
                // Fallback: assume 54km (Jerusalem-Tel Aviv average) if cities not found
                // This would fall into the lightblue zone (40-75km)
                distance = 54;
                fareZone = { zone: 'lightblue', data: FARE_RULES.lightblue, distance: distance };
            }

            var freeProfile = isFreeProfile(passengerType);
            var monthlyDiscount = getMonthlyDiscount(passengerType);

            // Calculate Single and Daily prices
            var singlePrice = freeProfile ? 0.00 : fareZone.data.single;
            var dailyPrice = freeProfile ? 0.00 : fareZone.data.daily;

            // Evaluate all monthly contracts
            var monthlyNational = evaluateMonthlyContract(
                MONTHLY_CONTRACTS.national, fareZone, origin, dest, monthlyDiscount, freeProfile
            );
            var monthlyTrain = evaluateMonthlyContract(
                MONTHLY_CONTRACTS.nationalTrain, fareZone, origin, dest, monthlyDiscount, freeProfile
            );
            var monthlyPeriphery = evaluateMonthlyContract(
                MONTHLY_CONTRACTS.periphery, fareZone, origin, dest, monthlyDiscount, freeProfile
            );
            var monthlyEilat = evaluateMonthlyContract(
                MONTHLY_CONTRACTS.eilat, fareZone, origin, dest, monthlyDiscount, freeProfile
            );

            return {
                // Single & Daily
                single: singlePrice,
                daily: dailyPrice,
                
                // Monthly contracts
                monthlyNational: monthlyNational,
                monthlyTrain: monthlyTrain,
                monthlyPeriphery: monthlyPeriphery,
                monthlyEilat: monthlyEilat,
                
                // Route info
                zone: fareZone.zone,
                zoneLabel: fareZone.data.label,
                distance: distance,
                isFallback: isFallback
            };
        }

        // ============================================================
        // UI RENDERING
        // ============================================================
        
        function renderPrice(elementId, value, valid) {
            var el = document.getElementById(elementId);
            if (valid) {
                el.textContent = value.toFixed(2);
                el.style.color = '';
            } else {
                el.textContent = value;
                el.style.color = '#999';
            }
        }

        var btn = document.getElementById('calculate-btn');
        btn.onclick = function() {
            var origin = document.getElementById('origin').value;
            var dest = document.getElementById('dest').value;
            var ticketType = document.querySelector('[name="ticketType"]:checked').value;
            var passengerType = document.querySelector('[name="passenger"]:checked').value;

            if (!origin || !dest) {
                alert('יש להזין מוצא ויעד');
                return;
            }

            btn.disabled = true;
            btn.textContent = '...';

            setTimeout(function() {
                try {
                    var result = calculateFare(origin, dest, passengerType);

                    // Update Single & Daily prices
                    document.getElementById('price-single').textContent = result.single.toFixed(2);
                    document.getElementById('price-daily').textContent = result.daily.toFixed(2);

                    // Update Monthly contract prices
                    renderPrice('price-monthly-national', 
                        result.monthlyNational.price, 
                        result.monthlyNational.valid);
                    renderPrice('price-monthly-train', 
                        result.monthlyTrain.price, 
                        result.monthlyTrain.valid);
                    document.getElementById('price-monthly-periphery').textContent = 
                        result.monthlyPeriphery.valid ? 
                            result.monthlyPeriphery.price.toFixed(2) : 
                            result.monthlyPeriphery.message;
                    document.getElementById('price-monthly-periphery').style.color = 
                        result.monthlyPeriphery.valid ? '' : '#c00';
                    document.getElementById('price-monthly-eilat').textContent = 
                        result.monthlyEilat.valid ? 
                            result.monthlyEilat.price.toFixed(2) : 
                            result.monthlyEilat.message;
                    document.getElementById('price-monthly-eilat').style.color = 
                        result.monthlyEilat.valid ? '' : '#c00';

                    // Update breakdown
                    document.getElementById('r-origin').textContent = origin;
                    document.getElementById('r-dest').textContent = dest;

                    // Determine the final selected price
                    var finalPrice = 0;
                    var typeLabel = '';
                    
                    if (ticketType === 'single') {
                        finalPrice = result.single;
                        typeLabel = 'נסיעה בודדת (' + result.zoneLabel + ')';
                    } else if (ticketType === 'daily') {
                        finalPrice = result.daily;
                        typeLabel = 'חופשי יומי (' + result.zoneLabel + ')';
                    } else {
                        // Monthly - use the primary national contract
                        finalPrice = result.monthlyNational.valid ? result.monthlyNational.price : 0;
                        typeLabel = MONTHLY_CONTRACTS.national.name + ' (' + result.zoneLabel + ')';
                    }

                    document.getElementById('r-type').textContent = typeLabel;
                    document.getElementById('r-final').textContent = finalPrice.toFixed(2) + ' ₪';

                    // Handle fallback notice
                    var fallbackEl = document.getElementById('fallback');
                    if (result.isFallback) {
                        fallbackEl.style.display = 'block';
                        fallbackEl.innerHTML = '<strong>⚠️ מנגנון מקומי פעיל - מחיר בסיס ' +
                            FARE_RULES.lightblue.single.toFixed(2) + ' ₪ (תכלת 40-75 ק"מ)</strong>';
                    } else {
                        fallbackEl.style.display = 'none';
                    }

                } catch (e) {
                    // Error fallback: use lightblue zone prices (40-75km)
                    document.getElementById('price-single').textContent = 
                        FARE_RULES.lightblue.single.toFixed(2);
                    document.getElementById('price-daily').textContent = 
                        FARE_RULES.lightblue.daily.toFixed(2);
                    document.getElementById('price-monthly-national').textContent = 
                        MONTHLY_CONTRACTS.national.base.toFixed(2);
                    document.getElementById('price-monthly-train').textContent = 
                        MONTHLY_CONTRACTS.nationalTrain.base.toFixed(2);
                    document.getElementById('price-monthly-periphery').textContent = 'שגיאה';
                    document.getElementById('price-monthly-eilat').textContent = 'שגיאה';
                    document.getElementById('r-final').textContent = 
                        FARE_RULES.lightblue.single.toFixed(2) + ' ₪';
                    document.getElementById('fallback').style.display = 'block';
                    document.getElementById('fallback').innerHTML = '<strong>⚠️ שגיאה - מחיר בסיס ' +
                        FARE_RULES.lightblue.single.toFixed(2) + ' ₪ (תכלת 40-75 ק"מ)</strong>';
                }

                btn.disabled = false;
                btn.textContent = '🔍 חשב תעריף';
                document.getElementById('results').classList.add('active');
            }, 50);
        };
    </script>
</body>
</html>
