<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון תעריפי תחבורה ציבורית</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#1a5276,#2874a6,#3498db);min-height:100vh;padding:30px 15px}
        .container{max-width:95%;margin:0 auto;background:#fff;border-radius:20px;padding:20px}
        .header{background:linear-gradient(#1e3a5f,#2c5282);color:#fff;padding:40px;text-align:center;border-radius:20px 20px 0 0}
        .header h1{font-size:1.8em;margin-bottom:10px}
        .form-section{padding:35px}
        .input-group{margin-bottom:20px}
        .input-group label{display:block;font-weight:600;color:#2c3e50;margin-bottom:8px}
        .input-group input{width:100%;padding:15px;border:2px solid #e0e0e0;border-radius:12px;font-size:1.1em}
        .ticket-type-section{background:#e8f5e9;border-radius:15px;padding:20px;margin-bottom:25px;border:2px solid #a5d6a7}
        .ticket-type-section h3{color:#2c3e50;margin-bottom:15px}
        .ticket-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
        .ticket-type-option{display:none}
        .ticket-type-option+label{display:block;padding:15px;background:#fff;border:2px solid #c8e6c9;border-radius:10px;text-align:center;cursor:pointer}
        .ticket-type-option:checked+label{background:#4caf50;color:#fff}
        .passenger-profiles{background:#f8f9fa;border-radius:15px;padding:20px;margin-bottom:25px}
        .passenger-profiles h3{color:#2c3e50;margin-bottom:15px}
        .profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
        .profile-option{display:none}
        .profile-option+label{display:block;padding:12px;background:#fff;border:2px solid #ddd;border-radius:10px;text-align:center;cursor:pointer}
        .profile-option:checked+label{background:#3498db;color:#fff}
        #calculate-btn{width:100%;padding:18px;background:linear-gradient(#27ae60,#2ecc71);color:#fff;border:none;border-radius:12px;font-size:1.3em;font-weight:bold;cursor:pointer}
        #calculate-btn:hover{transform:translateY(-2px)}
        #calculate-btn:disabled{background:#999;cursor:not-allowed}
        .results-section{padding:35px;display:none}
        .results-section.active{display:block}
        .result-card{background:#ffffff;color:#2c3e50;border-radius:20px;padding:25px;text-align:center;margin-bottom:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);border:2px solid #e0e0e0}
        .result-card .label{font-size:1.1em;margin-bottom:8px;color:#666}
        .result-card .ticket-type{font-size:1.2em;font-weight:bold;margin-bottom:5px;color:#2c3e50}
        .result-card .price{font-size:2.5em;font-weight:bold;color:#27ae60}
        .results-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px}
        .fare-breakdown{background:#f8f9fa;border-radius:15px;padding:20px;margin-top:20px}
        .breakdown-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #e0e0e0}
        .breakdown-item:last-child{font-weight:bold;color:#27ae60}
        .fallback-notice{background:#fff3cd;border-radius:10px;padding:15px;margin-top:15px}
        .disclaimer{margin-top:20px;padding:15px;background:#f8f9fa;border-radius:8px;font-size:0.85em;color:#666}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚌 מחשבון תעריפי תחבורה</h1>
        </div>
        <div class="form-section">
            <div class="input-group">
                <label>📍 מוצא:</label>
                <input type="text" id="origin" placeholder="ירושלים">
            </div>
            <div class="input-group">
                <label>🎯 יעד:</label>
                <input type="text" id="dest" placeholder="תל אביב">
            </div>
            <div class="ticket-type-section">
                <h3>🎫 סוג כרטיס:</h3>
                <div class="ticket-type-grid">
                    <div><input type="radio" name="ticketType" id="t-single" value="single" class="ticket-type-option" checked><label for="t-single"> נסיעה בודדת</label></div>
                    <div><input type="radio" name="ticketType" id="t-daily" value="daily" class="ticket-type-option"><label for="t-daily"> חופשי יומי</label></div>
                    <div><input type="radio" name="ticketType" id="t-monthly" value="monthly" class="ticket-type-option"><label for="t-monthly"> חופשי חודשי</label></div>
                </div>
            </div>
            <div class="passenger-profiles">
                <h3>👤 פרופיל:</h3>
                <div class="profile-grid">
                    <div><input type="radio" name="passenger" id="p-adult" value="adult" class="profile-option" checked><label for="p-adult"> מבוגר</label></div>
                    <div><input type="radio" name="passenger" id="p-youth" value="youth" class="profile-option"><label for="p-youth"> נוער (50%)</label></div>
                    <div><input type="radio" name="passenger" id="p-senior" value="senior" class="profile-option"><label for="p-senior"> ותיק/ות</label></div>
                    <div><input type="radio" name="passenger" id="p-student" value="student" class="profile-option"><label for="p-student"> סטודנט</label></div>
                    <div><input type="radio" name="passenger" id="p-disabled" value="disabled" class="profile-option"><label for="p-disabled"> נכה</label></div>
                    <div><input type="radio" name="passenger" id="p-soldier" value="soldier" class="profile-option"><label for="p-soldier"> חייל (חינם)</label></div>
                </div>
            </div>
            <button id="calculate-btn">🔍 חשב תעריף</button>
        </div>
        <div class="results-section" id="results">
            <div class="results-grid" id="results-grid">
                <div class="result-card" id="result-single">
                    <div class="ticket-type">נסיעה בודדת</div>
                    <div class="label">מחיר:</div>
                    <div class="price"><span id="price-single">0.00</span> ₪</div>
                </div>
                <div class="result-card" id="result-daily">
                    <div class="ticket-type">חופשי יומי</div>
                    <div class="label">מחיר:</div>
                    <div class="price"><span id="price-daily">0.00</span> ₪</div>
                </div>
                <div class="result-card" id="result-monthly">
                    <div class="ticket-type">חופשי חודשי</div>
                    <div class="label">מחיר:</div>
                    <div class="price"><span id="price-monthly">0.00</span> ₪</div>
                </div>
            </div>
            <div class="fare-breakdown">
                <div class="breakdown-item"><span>מוצא:</span><span id="r-origin">-</span></div>
                <div class="breakdown-item"><span>יעד:</span><span id="r-dest">-</span></div>
                <div class="breakdown-item"><span>סוג נבחר:</span><span id="r-type">-</span></div>
                <div class="breakdown-item"><span>סופי:</span><span id="r-final">0.00 ₪</span></div>
            </div>
            <div class="fallback-notice" id="fallback" style="display:none;">
                <strong>⚠️ מנגנון מקומי פעיל - מחיר בסיס 8.00 ₪</strong>
            </div>
            <div class="disclaimer">⚠️ שימוש להמחשה בלבד</div>
        </div>
    </div>
    <script>
        // Israeli cities with coordinates
        var CITIES={
            'תל אביב':[32.0853,34.7818],
            'ירושלים':[31.7683,35.2137],
            'חיפה':[32.794,34.9896],
            'באר שבע':[31.253,34.7915],
            'נתניה':[32.329,34.856],
            'אשדוד':[31.804,34.655],
            'רמת גן':[32.07,34.824],
            'פתח תקווה':[32.084,34.888],
            'ראשון לציון':[31.971,34.789],
            'חולון':[32.016,34.779],
            'נהריה':[32.9955,35.0925],
            'ראש הנקרה':[33.0855,35.1104],
            'עכו':[32.9277,35.0822],
            'כרמיאל':[32.9176,35.2969],
            'טבריה':[32.7940,35.5314],
            'נצרת':[32.7021,35.2978],
            'אילת':[29.5581,34.9512],
            'אשקלון':[31.8040,34.6550],
            'רחובות':[31.8928,34.8113],
            'הרצליה':[32.1656,34.8467],
            'הוד השרון':[32.1525,34.8903],
            'רמלה':[31.9275,34.8611],
            'לוד':[31.9497,34.8958],
            'מודיעין':[31.8973,35.0103],
            'בית שמש':[31.7466,34.9881]
        };
        
        // Long-distance intercity routes (Nahariya, northern cities to central Israel)
        // These are >80km trips that qualify for the special intercity fare
        var LONG_DISTANCE_ROUTES = [
            ['נהריה', 'תל אביב'],
            ['נהריה', 'רמת גן'],
            ['נהריה', 'ירושלים'],
            ['נהריה', 'חולון'],
            ['נהריה', 'ראשון לציון'],
            ['נהריה', 'פתח תקווה'],
            ['ראש הנקרה', 'תל אביב'],
            ['ראש הנקרה', 'רמת גן'],
            ['עכו', 'תל אביב'],
            ['עכו', 'רמת גן'],
            ['כרמיאל', 'תל אביב'],
            ['כרמיאל', 'רמת גן'],
            ['טבריה', 'תל אביב'],
            ['טבריה', 'רמת גן'],
            ['נצרת', 'תל אביב'],
            ['נצרת', 'רמת גן'],
            ['חיפה', 'ירושלים'],
            ['חיפה', 'אשקלון'],
            ['באר שבע', 'תל אביב'],
            ['באר שבע', 'רמת גן'],
            ['באר שבע', 'חיפה'],
            ['אילת', 'תל אביב'],
            ['אילת', 'ירושלים']
        ];
        
        // Distance threshold for long-distance intercity travel (km)
        var LONG_DISTANCE_THRESHOLD = 80;
        
        function dist(a,b,c,d){
            // Haversine formula - calculates distance between two coordinates
            // a,c = latitudes in degrees; b,d = longitudes in degrees
            var R=6371; // Earth radius in km
            var dLat=(c-a)*Math.PI/180;
            var dLon=(d-b)*Math.PI/180;
            var x=Math.sin(dLat/2)*Math.sin(dLat/2)+
                   Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
                   Math.sin(dLon/2)*Math.sin(dLon/2);
            return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
        }
        
        function coords(n){
            n=n.trim().toLowerCase();
            for(var k in CITIES){
                if(k.trim().toLowerCase()===n)return CITIES[k];
            }
            return null;
        }
        
        // Get discount percentage for profile (used for Monthly Pass only)
        function getDiscount(p){
            var d={adult:0,youth:0.5,senior:0.5,student:0.33,disabled:0.5,soldier:1};
            return d[p]||0;
        }
        
        // Check if profile gets FREE travel (0.00 ₪)
        function isFreeProfile(p){
            return p === 'soldier' || p === 'national_service' || 
                   p === 'pre_military' || p === 'blind';
        }
        
        // Check if route is long-distance intercity
        function isLongDistanceRoute(origin, dest){
            origin = origin.trim().toLowerCase();
            dest = dest.trim().toLowerCase();
            
            // Check explicit long-distance routes
            for(var i = 0; i < LONG_DISTANCE_ROUTES.length; i++){
                var r = LONG_DISTANCE_ROUTES[i];
                if((r[0].trim().toLowerCase() === origin && r[1].trim().toLowerCase() === dest) ||
                   (r[0].trim().toLowerCase() === dest && r[1].trim().toLowerCase() === origin)){
                    return true;
                }
            }
            
            // Calculate distance and check threshold
            var oc = coords(origin);
            var dc = coords(dest);
            if(oc && dc){
                var d = dist(oc[0], oc[1], dc[0], dc[1]);
                return d >= LONG_DISTANCE_THRESHOLD;
            }
            
            return false;
        }
        
        // Get base prices based on distance
        function getBasePrices(origin, dest){
            if(isLongDistanceRoute(origin, dest)){
                // Long-distance intercity fares (Ministry of Transport official rates)
                return {
                    single: 49.50,
                    daily: 37.50,
                    monthly: 315.00
                };
            } else {
                // Short/medium distance standard fares
                return {
                    single: 8.00,
                    daily: 13.00,
                    monthly: 150.00
                };
            }
        }
        
        var btn=document.getElementById('calculate-btn');
        btn.onclick=function(){
            var o=document.getElementById('origin').value;
            var d=document.getElementById('dest').value;
            var t=document.querySelector('[name="ticketType"]:checked').value;
            var p=document.querySelector('[name="passenger"]:checked').value;
            
            if(!o||!d){
                alert('יש להזין מוצא ויעד');
                return;
            }
            
            btn.disabled=true;
            btn.textContent='...';
            
            setTimeout(function(){
                try{
                    var oc=coords(o);
                    var dc=coords(d);
                    var discount=getDiscount(p);
                    var passengerType=p;
                    var freeProfile=isFreeProfile(passengerType);
                    var longDistance=isLongDistanceRoute(o,d);
                    
                    // Get appropriate base prices
                    var basePrices=getBasePrices(o,d);
                    var typeLabels={
                        single:'נסיעה בודדת',
                        daily:'חופשי יומי',
                        monthly:'חופשי חודשי'
                    };
                    
                    // Calculate prices
                    var prices={};
                    
                    // CRITICAL FIX: Single Ride - NO percentage discounts
                    // Everyone pays 100% full price, EXCEPT FREE profiles (0.00 ₪)
                    if(freeProfile){
                        prices.single=0.00;
                    } else {
                        prices.single=basePrices.single; // 100% full price
                    }
                    
                    // Daily Pass - Full price for everyone, EXCEPT FREE profiles (0.00 ₪)
                    if(freeProfile){
                        prices.daily=0.00;
                    } else {
                        prices.daily=basePrices.daily; // 100% full price
                    }
                    
                    // Monthly Pass - RETAIN profile discounts
                    if(freeProfile){
                        prices.monthly=0.00;
                    } else {
                        prices.monthly=Math.round(basePrices.monthly*(1-discount)*100)/100;
                    }
                    
                    // Display all three ticket type prices
                    document.getElementById('price-single').textContent=prices.single.toFixed(2);
                    document.getElementById('price-daily').textContent=prices.daily.toFixed(2);
                    document.getElementById('price-monthly').textContent=prices.monthly.toFixed(2);
                    
                    // Update breakdown with selected ticket type
                    document.getElementById('r-origin').textContent=o;
                    document.getElementById('r-dest').textContent=d;
                    document.getElementById('r-type').textContent=typeLabels[t];
                    document.getElementById('r-final').textContent=prices[t].toFixed(2)+' ₪';
                    
                    // Show fallback only if cities not found in database
                    var useFallback = (!oc || !dc);
                    document.getElementById('fallback').style.display=useFallback?'block':'none';
                    
                    // Update fallback notice with correct base price
                    if(useFallback){
                        document.getElementById('fallback').innerHTML='<strong>⚠️ מנגנון מקומי פעיל - מחיר בסיס ' + basePrices.single.toFixed(2) + ' ₪</strong>';
                    }
                    
                } catch(e){
                    // Fallback error handling with realistic intercity prices
                    document.getElementById('price-single').textContent='49.50';
                    document.getElementById('price-daily').textContent='37.50';
                    document.getElementById('price-monthly').textContent='315.00';
                    document.getElementById('r-final').textContent='49.50 ₪';
                    document.getElementById('fallback').style.display='block';
                    document.getElementById('fallback').innerHTML='<strong>⚠️ מנגנון מקומי פעיל - מחיר בסיס 49.50 ₪</strong>';
                }
                
                btn.disabled=false;
                btn.textContent='🔍 חשב תעריף';
                document.getElementById('results').classList.add('active');
            },50);
        };
    </script>
</body>
</html>
